name: Forecast on AI tournament

# Runs the bot on the live AIB tournament + MiniBench.
# It skips questions it has already forecast, so frequent runs are safe and cheap.
#
# Triggering is EXTERNAL: cron-job.org calls the GitHub REST API every ~20 min
# (POST /repos/<owner>/<repo>/actions/workflows/<id>/dispatches) to fire the
# workflow_dispatch event below. GitHub's own `schedule:` cron was unreliable for
# this repo (silently never fired), so it was removed. Do NOT add `schedule:`
# back unless you also disable the cron-job.org job, or both will double-trigger.
on:
  workflow_dispatch: {}        # how cron-job.org (and manual Actions-tab runs) trigger this

# Never let two runs overlap (they'd double-forecast in-flight questions).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run bot
        run: python main.py --mode tournament
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}   # current primary LLM provider (see main.py CONFIG)
          # The rest are optional — set whichever you have. OPENROUTER_API_KEY is the
          # intended target once free credits are granted (swap the panel in main.py then).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
